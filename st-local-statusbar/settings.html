<div class="st-local-statusbar-settings">
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <b>本地状态栏</b>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
      <label class="checkbox_label" for="st_local_statusbar_enabled">
        <input id="st_local_statusbar_enabled" type="checkbox" />
        <span>启用本地状态栏</span>
      </label>
      <input id="st_local_statusbar_reload" class="menu_button" type="button" value="重载状态栏" />
      <small class="notes">
        当前扩展完全本地加载，不再依赖 GitHub、jsDelivr 或正则远程替换。
      </small>
    </div>
  </div>
</div>
